<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOROVIA — Page introuvable</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #F5C842; --gold2: #FFE27A; --pink: #FF4D8D;
  --dark: #07070F; --text: #F0EEF8; --muted: rgba(240,238,248,0.42);
}

body {
  background: var(--dark); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 24px;
  position: relative; overflow: hidden;
}

.amb {
  position: fixed; inset: 0; pointer-events: none;
}
.amb::before {
  content: ''; position: absolute; top: -30%; left: 30%;
  width: 80vw; height: 80vh;
  background: radial-gradient(ellipse, rgba(245,200,66,0.06) 0%, transparent 60%);
}
.amb::after {
  content: ''; position: absolute; bottom: -20%; right: -10%;
  width: 60vw; height: 60vh;
  background: radial-gradient(ellipse, rgba(255,77,141,0.04) 0%, transparent 60%);
}

.logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  letter-spacing: 0.15em;
  background: linear-gradient(135deg, var(--gold), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-decoration: none;
  position: absolute; top: 24px; left: 32px;
}

.error-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(100px, 20vw, 180px);
  line-height: 1; letter-spacing: 0.06em;
  background: linear-gradient(135deg, var(--gold2), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px;
  opacity: 0.15;
}

.emoji { font-size: 56px; margin-bottom: 20px; }

h1 {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 5vw, 42px);
  letter-spacing: 0.06em; margin-bottom: 12px;
}

p {
  font-size: 15px; color: var(--muted); font-weight: 300;
  line-height: 1.7; max-width: 380px; margin: 0 auto 32px;
}

.btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.btn-home {
  background: linear-gradient(135deg, var(--gold), #E8A020);
  border: none; border-radius: 13px; padding: 13px 28px;
  font-family: 'Bebas Neue', sans-serif; font-size: 16px;
  letter-spacing: 0.1em; color: #000; cursor: pointer;
  text-decoration: none; transition: opacity 0.2s;
}
.btn-home:hover { opacity: 0.88; }

.btn-back {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 13px; padding: 13px 28px;
  font-size: 14px; color: var(--muted); cursor: pointer;
  text-decoration: none; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.btn-back:hover { background: rgba(255,255,255,0.08); color: var(--text); }

.score-hint {
  margin-top: 48px; font-size: 13px; color: rgba(240,238,248,0.2);
  font-style: italic;
}
</style>
</head>
<body>

<div class="amb"></div>

<a href="index.html" class="logo">SCOROVIA</a>

<div class="error-num">404</div>
<div class="emoji">🔍</div>

<h1>Page introuvable</h1>
<p>Cette page n'existe pas ou a été déplacée. Pas de panique — votre note vous attend toujours !</p>

<div class="btns">
  <a href="index.html" class="btn-home">RETOUR À L'ACCUEIL</a>
  <a href="javascript:history.back()" class="btn-back">← Page précédente</a>
</div>

<div class="score-hint">
  "Même les pages perdues méritent une note... mais pas celle-là." 😄
</div>

</body>
</html>
